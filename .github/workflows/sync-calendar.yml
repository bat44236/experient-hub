name: Sync Google Calendars

on:
  schedule:
    - cron: '0 6,12,18 * * *'  # runs at 6am, 12pm, 6pm UTC daily
  workflow_dispatch:             # allows manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch calendar events
        env:
          GCAL_API_KEY: ${{ secrets.GCAL_API_KEY }}
        run: |
          node << 'SCRIPT'
          const https  = require('https');
          const fs     = require('fs');
          const apiKey = process.env.GCAL_API_KEY;

          const CALENDARS = [
            { id: 'en.usa#holiday@group.v.calendar.google.com',                                                  cat: 'holiday'  },
            { id: '9e3d406ff577e84f8520707b3d6fde4f0231d9af3bfa3d540139a70e801dbec2@group.calendar.google.com', cat: 'workann'  },
            { id: '382b2aa86827b768761c16ce3b5bec6323f1d9f62fed78aaf107bf83c537a410@group.calendar.google.com', cat: 'cnend'    },
            { id: '3e2fc9cd2ded39150182128a50e16d2d3ac65d7deabdaa411c2f497446d002fb@group.calendar.google.com', cat: 'birthday' },
          ];

          const year    = new Date().getFullYear();
          const timeMin = encodeURIComponent(new Date(year, 0, 1).toISOString());
          const timeMax = encodeURIComponent(new Date(year + 1, 0, 1).toISOString());

          function fetchCal(cal) {
            return new Promise((resolve) => {
              const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?key=${apiKey}&timeMin=${timeMin}&timeMax=${timeMax}&singleEvents=true&orderBy=startTime&maxResults=500`;
              https.get(url, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try {
                    const json = JSON.parse(data);
                    const events = (json.items || []).map(item => ({
                      id:            item.id,
                      title:         item.summary || '(No title)',
                      date:          item.start.date || item.start.dateTime?.split('T')[0],
                      allDay:        !!item.start.date,
                      startDateTime: item.start.dateTime || item.start.date,
                      endDateTime:   item.end?.dateTime  || item.end?.date,
                      description:   item.description || '',
                      location:      item.location    || '',
                      cat:           cal.cat,
                    }));
                    resolve(events);
                  } catch(e) {
                    console.warn('Parse error for', cal.id, e.message);
                    resolve([]);
                  }
                });
              }).on('error', err => {
                console.warn('Fetch error for', cal.id, err.message);
                resolve([]);
              });
            });
          }

          async function main() {
            const results = await Promise.all(CALENDARS.map(fetchCal));
            const events  = results.flat().filter(e => e.date);
            const output  = { updatedAt: new Date().toISOString(), events };
            fs.writeFileSync('events.json', JSON.stringify(output, null, 2));
            console.log(`Saved ${events.length} events to events.json`);
          }

          main();
          SCRIPT

      - name: Commit events.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.json
          git diff --staged --quiet || git commit -m "chore: sync calendar events [skip ci]"
          git pull --rebase origin main
          git push
